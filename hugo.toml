# baseURL 莫擅改！会影响SEO
baseURL = 'https://swaw.com/'
languageCode = 'en-us'
title = 'swaw'
theme = "banyan"
preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = false
panicOnWarning = true

[params]
# If account_url is empty or commented out, the login button will ONLY show the logo and link to the Banyan theme GitHub repo.
# If configured, it will show the "Account" text and link to the specified URL.
account_url = "https://github.com/swawai"
copyright = "人不工智能 &middot; Swaw LLC"
icp = "粤ICP备2024338434号"
[params.link_prefetch]
# 四类链接预取模式：
#   "" / "off"                 = 关闭该类预取
#   "rel-prefetch"             = 输出 <link rel="prefetch" as="document">，由浏览器自行低优先级调度
#   "conservative-prefetch"    = 通过 Speculation Rules API 做保守 prefetch
#   "moderate-prefetch"        = 通过 Speculation Rules API 做中等激进 prefetch
#   "eager-prefetch"           = 通过 Speculation Rules API 做激进 prefetch
#   "conservative-prerender"   = 通过 Speculation Rules API 做保守 prerender
#   "moderate-prerender"       = 通过 Speculation Rules API 做中等激进 prerender
#   "eager-prerender"          = 通过 Speculation Rules API 做激进 prerender
# 建议：
#   sort_siblings 适合 "rel-prefetch" / "*-prefetch"
#   descendants 适合 "" / "rel-prefetch" / "*-prefetch"
#   post 适合 "" / "*-prefetch" / "*-prerender"
#   nav 适合 "" / "rel-prefetch" / "*-prefetch"
# 说明：
#   这些规则在 Hugo 渲染阶段直接输出到 head，不依赖前端预取脚本。
#   当前 sort_siblings / descendants / post / nav 分别对应
#   排序兄弟项 / descendants / post / 菜单与面包屑导航。
nav = "rel-prefetch"
sort_siblings = "rel-prefetch"
descendants = "rel-prefetch"
post = "moderate-prefetch"

[params.service_worker]
# mode:
#   "enable"  = 注册 /sw.js，启用 HTML 导航 stale-while-revalidate，并在检测到新版本时做弱提醒
#   "disable" = 不再启用 SW；页面会尝试注销旧注册并清理本项目缓存，同时继续输出一个惰性 /sw.js 便于旧注册尽快退场
#   "off"     = 不注入 SW 管理脚本；适合在 disable 跑够一段时间后彻底停用
mode = "enable"
# 建议发布时手动维护；若留空则回退到本次构建时间戳。
# version = "202603110001"
# 留空：仅启用 HTML 导航页缓存
# 非空：在此基础上，对这些同源静态资源后缀额外启用 cache-first
# 建议只填强缓存、文件名已 hash 的静态资源类型
# cache_first_extensions = ["css", "js", "svg", "png", "ico", "woff2", "webmanifest"]

[params.social]
github = "https://github.com/swawai"

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[pagination]
pagerSize = 30
[taxonomies]
udc = "udc"
tag = "tags"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.minify]
disableXML = true

[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]
[mediaTypes."application/javascript"]
suffixes = ["js"]

[outputFormats]
[outputFormats.byname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name"
[outputFormats.bynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name-asc"
[outputFormats.bydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
#path      = "by-date"
[outputFormats.bydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-date-asc"
[outputFormats.bycount]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count"
[outputFormats.bycountasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count-asc"
[outputFormats.allbydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date"
[outputFormats.allbydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date-asc"
[outputFormats.allbypath]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path"
[outputFormats.allbypathasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path-asc"
[outputFormats.allbyname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name"
[outputFormats.allbynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name-asc"
[outputFormats.allbysize]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size"
[outputFormats.allbysizeasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size-asc"
[outputFormats.webmanifest]
mediaType = "application/manifest+json"
baseName = "site"
isPlainText = true
notAlternative = true
root = true
[outputFormats.swjs]
mediaType = "application/javascript"
baseName = "sw"
isPlainText = true
notAlternative = true
root = true

# 输出顺序会影响 Hugo 为 list/node 页面选择的主 URL。
# 这里把 bydate 放在最前面，使 /、/tags/、/udc/ 等无 by-* 路径成为默认公开路径；
# 若把 byname 等排到前面，.Permalink / .RelPermalink / .Site.Home.RelPermalink 可能改为指向 /by-name/...。
[outputs]
section  = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
taxonomy = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
term     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.outputs]
# 英文默认语言也保持相同顺序，避免根路径主 URL 被 /by-name/... 抢占。
section  = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss","webmanifest","swjs"]
taxonomy = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
term     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
[languages.en.params]
description = "Systems Work, And We..."
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2

[languages.zh.params]
description = "swaw——人不工，人生不必由工作定义"
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3

[languages.zh-tw.params]
description = "swaw——人不工，人生不必由工作定义"
locale = "zh_TW"

[permalinks]
mypost = "/p/:slug/"
blog = "/p/:slug/"
