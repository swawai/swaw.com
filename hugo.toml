# hugo.toml
baseURL = 'http://localhost:1313/'
languageCode = 'en-us'
title = 'swaw'
theme = "banyan"
preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = false
panicOnWarning = true

[params]
# If account_url is empty or commented out, the login button will ONLY show the logo and link to the Banyan theme GitHub repo.
# If configured, it will show the "Account" text and link to the specified URL.
account_url = "https://github.com/swawai"
copyright = "人不工智能 &middot; Swaw LLC"
icp = "粤ICP备2024338434号"
[params.social]
github = "https://github.com/swawai"

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[pagination]
pagerSize = 30
[taxonomies]
udc = "udc"
tag = "tags"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.minify]
disableXML = true

[outputFormats]
[outputFormats.byname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name"
[outputFormats.bynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name-asc"
[outputFormats.bydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
#path      = "by-date"
[outputFormats.bydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-date-asc"
[outputFormats.bycount]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count"
[outputFormats.bycountasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count-asc"
[outputFormats.allbydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date"
[outputFormats.allbydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date-asc"
[outputFormats.allbypath]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path"
[outputFormats.allbypathasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path-asc"
[outputFormats.allbyname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name"
[outputFormats.allbynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name-asc"
[outputFormats.allbysize]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size"
[outputFormats.allbysizeasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size-asc"
[outputFormats.i18njson]
mediaType = "application/json"
baseName  = "i18n"
isPlainText = true
notAlternative = true
# 站点支持语言列表（JSON），供前端语言跳转 / 404 等逻辑统一使用
[outputFormats.langlist]
mediaType = "application/json"
baseName  = "lang-list"
isPlainText = true
notAlternative = true
root = true

[outputs]
section  = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss","i18njson"]
taxonomy = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
term     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.outputs]
section  = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss","i18njson","langlist"]
taxonomy = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
term     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
[languages.en.params]
description = "The AI creators' club: AIGC practice, IP development, and monetization."
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2

[languages.zh.params]
description = "swaw——AI时代创作者的俱乐部: AIGC实践, IP沉淀, 商业变现"
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3

[languages.zh-tw.params]
description = "swaw——AI時代創作者的俱樂部: AIGC實踐, IP沉澱, 商業變現"
locale = "zh_TW"

[permalinks]
mypost = "/p/:slug/"
blog = "/p/:slug/"

