# baseURL 莫擅改！会影响SEO
baseURL = 'https://swaw.com/'
languageCode = 'en-us'
title = 'swaw'
theme = "banyan"
preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = false
panicOnWarning = true

[params]
# If account_url is empty or commented out, the login button will ONLY show the logo and link to the Banyan theme GitHub repo.
# If configured, it will show the "Account" text and link to the specified URL.
account_url = "https://github.com/swawai"
copyright = "人不工智能 &middot; Swaw LLC"
icp = "粤ICP备2024338434号"
[params.link_prefetch]
# 四类链接预取模式：
#   "" / "off"      = 关闭该类链接预取
#   "hover"         = 仅在 hover / touchstart 时预取
#   "viewport"      = 仅在较小视口中，链接进入视区后预取
#   "viewport-all"  = 不区分视口大小，链接进入视区后预取
# 建议：
#   sort_siblings 适合 "viewport" 或 "viewport-all"
#   descendants 适合 "" / "hover" / "viewport"
#   post 适合 "" / "hover"
#   nav 适合 "" / "hover"
# 说明：
#   这里只控制带 data-prefetch-kind 标记的链接；
#   当前 sort_siblings / descendants / post / nav 分别对应
#   排序兄弟项 / descendants / post / 菜单与面包屑导航。
sort_siblings = "viewport"
descendants = "viewport"
post = "hover"
nav = "hover"

[params.service_worker]
# enabled = true  : 注册站点根路径 /sw.js，并启用 HTML 导航页 stale-while-revalidate
# enabled = false : 不注册 service worker；前端会尝试注销旧注册并清理本项目缓存
# cache_first_extensions:
#   - 留空：仅启用 HTML 导航页缓存
#   - 非空：在此基础上，对这些同源静态资源后缀额外启用 cache-first
#   - 建议只填强缓存、文件名已 hash 的静态资源类型
enabled = true
#cache_first_extensions = ["css", "js", "svg", "png", "ico", "woff2", "webmanifest"]



[params.social]
github = "https://github.com/swawai"

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[pagination]
pagerSize = 30
[taxonomies]
udc = "udc"
tag = "tags"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.minify]
disableXML = true

[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]
[mediaTypes."application/javascript"]
suffixes = ["js"]

[outputFormats]
[outputFormats.byname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name"
[outputFormats.bynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name-asc"
[outputFormats.bydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
#path      = "by-date"
[outputFormats.bydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-date-asc"
[outputFormats.bycount]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count"
[outputFormats.bycountasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count-asc"
[outputFormats.allbydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date"
[outputFormats.allbydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date-asc"
[outputFormats.allbypath]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path"
[outputFormats.allbypathasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path-asc"
[outputFormats.allbyname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name"
[outputFormats.allbynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name-asc"
[outputFormats.allbysize]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size"
[outputFormats.allbysizeasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size-asc"
[outputFormats.i18njson]
mediaType = "application/json"
baseName  = "i18n"
isPlainText = true
notAlternative = true
# 站点支持语言列表（JSON），供前端语言跳转 / 404 等逻辑统一使用
[outputFormats.langlist]
mediaType = "application/json"
baseName  = "lang-list"
isPlainText = true
notAlternative = true
root = true
[outputFormats.webmanifest]
mediaType = "application/manifest+json"
baseName = "site"
isPlainText = true
notAlternative = true
root = true
[outputFormats.swjs]
mediaType = "application/javascript"
baseName = "sw"
isPlainText = true
notAlternative = true
root = true

# 输出顺序会影响 Hugo 为 list/node 页面选择的主 URL。
# 这里把 bydate 放在最前面，使 /、/tags/、/udc/ 等无 by-* 路径成为默认公开路径；
# 若把 byname 等排到前面，.Permalink / .RelPermalink / .Site.Home.RelPermalink 可能改为指向 /by-name/...。
[outputs]
section  = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss","i18njson","webmanifest","swjs"]
taxonomy = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
term     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.outputs]
# 英文默认语言也保持相同顺序，避免根路径主 URL 被 /by-name/... 抢占。
section  = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss","i18njson","langlist","webmanifest","swjs"]
taxonomy = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
term     = ["bydate","byname","bynameasc","bydateasc","bycount","bycountasc","rss"]
[languages.en.params]
description = "Systems Work, And We..."
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2

[languages.zh.params]
description = "swaw——人不工，人生不必由工作定义"
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3

[languages.zh-tw.params]
description = "swaw——人不工，人生不必由工作定义"
locale = "zh_TW"

[permalinks]
mypost = "/p/:slug/"
blog = "/p/:slug/"
